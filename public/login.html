<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Clínica Carmo Palitot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c1a0e 0%, #4a2c0a 50%, #2c1a0e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: #fff;
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-header h1 {
            font-size: 22px;
            font-weight: 800;
            color: #2c1a0e;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .login-header p {
            font-size: 13px;
            color: #8B6914;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #8B6914, #C9A84C);
            margin: 16px auto 0;
            border-radius: 2px;
        }

        .login-subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0d0b0;
            border-radius: 8px;
            font-size: 15px;
            color: #333;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            background: #fdfaf5;
        }

        .form-group input:focus {
            border-color: #8B6914;
            box-shadow: 0 0 0 3px rgba(139, 105, 20, 0.12);
            background: #fff;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #8B6914, #C9A84C);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }

        .btn-login:hover {
            opacity: 0.92;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-msg {
            background: #fff0f0;
            border: 1px solid #ffcccc;
            color: #cc2222;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .error-msg.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Carmo &amp; Palitot</h1>
            <p>Health Institute</p>
            <div class="divider"></div>
        </div>

        <p class="login-subtitle">Sistema de Controle de Faturamento</p>

        <div class="error-msg" id="errorMsg">Usuário ou senha incorretos. Tente novamente.</div>

        <form id="loginForm" onsubmit="fazerLogin(event)">
            <div class="form-group">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
        </form>
    </div>

    <script>
        async function fazerLogin(event) {
            event.preventDefault();

            const btn = document.getElementById('btnLogin');
            const errorMsg = document.getElementById('errorMsg');
            const usuario = document.getElementById('usuario').value;
            const senha = document.getElementById('senha').value;

            btn.disabled = true;
            btn.textContent = 'Entrando...';
            errorMsg.classList.remove('visible');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, senha })
                });

                if (res.ok) {
                    window.location.href = '/';
                } else {
                    errorMsg.classList.add('visible');
                    btn.disabled = false;
                    btn.textContent = 'Entrar';
                }
            } catch (err) {
                errorMsg.textContent = 'Erro de conexão. Tente novamente.';
                errorMsg.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        }
    </script>
</body>
</html>
